# Render Infrastructure-as-Code Blueprint for NexusIQ
# Deploys the FastAPI backend and a managed PostgreSQL database.

services:
  - type: web
    name: nexusiq-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && pip install -e ../ai-engine"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      # Automatically bind the database connection string from the PostgreSQL service
      - key: DATABASE_URL
        fromDatabase:
          name: nexusiq-db
          property: connectionString
      # Placeholder environment variables for the user to configure in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false

databases:
  - name: nexusiq-db
    plan: free
    ipAllowList: [] # empty list allows access from Render services only (secure)
